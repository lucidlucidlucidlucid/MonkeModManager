name: Build
on:
  push:
    branches: [main]
    paths-ignore:
      - 'mods.json'
      - 'credits.json'
      - 'version.txt'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm install
      - run: npm run tauri build -- --no-bundle

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          files: src-tauri/target/release/MonkeModManager.exe
